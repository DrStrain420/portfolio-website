<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="header-left">
            <div class="globe-placeholder">
                <img src="https://via.placeholder.com/80/000000/FFFFFF?text=Globe+GIF" alt="Globe Animation">
            </div>
        </div>
        <div class="header-right">
            <h1 class="site-title">PORTFOLIO</h1>
            <nav class="site-nav">
                <ul>
                    <li><a href="#work">Work</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="content-grid">
        <section id="work" class="grid-section">
            <div class="grid-col">
                <h2>Featured Project</h2>
                <p>A sophisticated editorial exploration of typography and whitespace. The content speaks for itself.</p>
            </div>
            <div class="grid-col">
                <div class="image-placeholder"></div>
            </div>
        </section>

        <section id="about" class="grid-section">
            <div class="grid-col full-width">
                <h2>About the Studio</h2>
                <p>Focusing on stark contrasts, precise grids, and typographic rigor. We build digital spaces that feel like print.</p>
            </div>
        </section>
    </main>
</body>
</html>
