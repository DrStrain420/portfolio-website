<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DITHERER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <h1>DITHERER</h1>
    </header>
    <main class="app-layout">
        <section class="controls-section">
            <div id="drop-zone" class="drop-zone">
                <p>UPLOAD IMAGE</p>
                <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp" hidden>
            </div>

            <div class="sliders">
                <div class="slider-group">
                    <label for="threshold">THRESHOLD: <span id="threshold-val">128</span></label>
                    <input type="range" id="threshold" min="1" max="255" value="128">
                </div>
                <div class="slider-group">
                    <label for="contrast">CONTRAST: <span id="contrast-val">0</span></label>
                    <input type="range" id="contrast" min="-100" max="100" value="0">
                </div>
                <div class="slider-group">
                    <label for="resolution">RESOLUTION: <span id="resolution-val">1</span></label>
                    <input type="range" id="resolution" min="1" max="20" value="1">
                </div>
                <div class="slider-group">
                    <label for="blur">BLUR: <span id="blur-val">0</span></label>
                    <input type="range" id="blur" min="0" max="20" value="0">
                </div>
                <div class="slider-group">
                    <label for="glow">GLOW: <span id="glow-val">0</span></label>
                    <input type="range" id="glow" min="0" max="50" value="0">
                </div>
                <div class="slider-group">
                    <label for="tonal">TONAL MAP: <span id="tonal-val">0</span></label>
                    <input type="range" id="tonal" min="-100" max="100" value="0">
                </div>
            </div>

            <div class="presets">
                <label>PRESETS</label>
                <div class="preset-group">
                    <button id="preset-newsy" class="preset-btn">NEWSY</button>
                    <button id="preset-glitch" class="preset-btn">GLITCH</button>
                    <button id="preset-softbot" class="preset-btn">SOFT-BOT</button>
                </div>
            </div>
            
            <input type="hidden" id="shape" value="default">

            <div class="view-toggle">
                <button id="btn-original" class="toggle-btn">ORIGINAL</button>
                <button id="btn-dithered" class="toggle-btn active">DITHERED</button>
            </div>

            <button id="download-btn" class="action-btn" disabled>EXPORT PNG</button>
        </section>

        <section class="preview-section">
            <div class="canvas-container" id="canvas-container" style="display:none;">
                <canvas id="original-canvas"></canvas>
                <canvas id="canvas"></canvas>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
